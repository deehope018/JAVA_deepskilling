<h2>Course List</h2>

<input type="text" [(ngModel)]="searchTerm" placeholder="Search courses" />

<button (click)="search()">
    Search
</button>

<hr>

<div *ngFor="let course of courses">

    <div (click)="goToCourse(course.id)" style="cursor: pointer; margin-bottom:20px;">

        <app-course-card [course]="course" (enrollRequested)="onEnroll($event)">
        </app-course-card>

    </div>

</div>
