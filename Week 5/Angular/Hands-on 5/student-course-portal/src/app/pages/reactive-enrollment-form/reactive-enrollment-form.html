<h2>Reactive Enrollment Form</h2>

<form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">

    <!-- Student Name -->
    <div>
        <label>Student Name</label><br>

        <input type="text" formControlName="studentName">

        <div *ngIf="enrollForm.get('studentName')?.touched &&
             enrollForm.get('studentName')?.errors?.['required']">

            Name is required.

        </div>

        <div *ngIf="enrollForm.get('studentName')?.touched &&
             enrollForm.get('studentName')?.errors?.['minlength']">

            Minimum 3 characters.

        </div>
    </div>

    <br>

    <!-- Email -->
    <div>
        <label>Email</label><br>

        <input type="email" formControlName="studentEmail">

        <div *ngIf="enrollForm.get('studentEmail')?.touched &&
             enrollForm.get('studentEmail')?.errors?.['required']">

            Email is required.

        </div>

        <div *ngIf="enrollForm.get('studentEmail')?.touched &&
             enrollForm.get('studentEmail')?.errors?.['email']">

            Invalid email.

        </div>

        <div *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">

            Email already taken.

        </div>
    </div>

    <br>

    <!-- Course ID -->
    <div>
        <label>Course ID</label><br>

        <input type="text" formControlName="courseId">

        <div *ngIf="enrollForm.get('courseId')?.touched &&
             enrollForm.get('courseId')?.errors?.['required']">

            Course ID is required.

        </div>

        <div *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">

            Course code starting with XX is not allowed.

        </div>
    </div>

    <br>

    <!-- Semester -->
    <div>

        <label>Preferred Semester</label><br>

        <select formControlName="preferredSemester">

            <option value="Odd">Odd</option>

            <option value="Even">Even</option>

        </select>

    </div>

    <br>

    <!-- Terms -->
    <div>

        <label>

            <input type="checkbox" formControlName="agreeToTerms">

            Agree to Terms

        </label>

        <div *ngIf="enrollForm.get('agreeToTerms')?.touched &&
             enrollForm.get('agreeToTerms')?.errors?.['required']">

            You must accept the terms.

        </div>

    </div>

    <hr>

    <h3>Additional Courses</h3>

    <button type="button" (click)="addCourse()">

        Add Another Course

    </button>

    <br><br>

    <!-- FormArray -->

    <div formArrayName="additionalCourses">

        <div *ngFor="let control of additionalCourses.controls; let i = index">

            <input type="text" [formControlName]="i">

            <button type="button" (click)="removeCourse(i)">

                Remove

            </button>

            <br><br>

        </div>

    </div>

    <hr>

    <button type="submit" [disabled]="enrollForm.invalid">

        Submit

    </button>

</form>
